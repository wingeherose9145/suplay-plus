name: Build Full Dictionary (Text Stream)

on:
  workflow_dispatch:
    inputs:
      base64_string:
        description: '请直接在下方框中粘贴你复制的 Base64 长文本'
        required: true
        type: string

jobs:
  build-mdict:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 还原还原大体积 MDX 文件
        run: |
          # 将输入的文本长流解码并恢复成原本的二进制 mdx 文件
          echo "${{ github.event.inputs.base64_string }}" | base64 --decode > ./xsjrihanshuangjie.mdx

      - name: 3. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. 安装 Mdict 打包工具
        run: |
          pip install mdict-utils

      - name: 5. 编译与打包
        run: |
          mkdir -p output
          
          # 自动判断并处理文件
          if file ./xsjrihanshuangjie.mdx | grep -q "text"; then
            mdict --db output/xsjrihanshuangjie.mdx --pack xsjrihanshuangjie.mdx
          else
            cp xsjrihanshuangjie.mdx output/
          fi
          
          # 打包资源（如果有 resources 文件夹）
          if [ -d "resources" ]; then
            mdict --db output/xsjrihanshuangjie.mdd --pack resources/
          fi
          
          # 自动匹配并复制 CSS
          cp *.css output/xsjrihanshuangjie.css 2>/dev/null || cp *.css output/ 2>/dev/null || true

      - name: 6. 导出最终成品
        uses: actions/upload-artifact@v4
        with:
          name: Full-Version-Dictionary
          path: output/
