name: Build APK with Full Dictionary

on:
  workflow_dispatch: # 允许网页端手动一键运行

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 从最新的 Release 自动下载大文件
        run: |
          echo "开始从本仓库最新的 Release 中下载大文件..."
          gh release download --pattern "xsjrihanshuangjie.mdx" --repo ${{ github.repository }}
          echo "下载成功！"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. 安装 Mdict 打包工具
        run: |
          pip install mdict-utils

      - name: 5. 编译词库并直接内置到 Android Assets 目录
        run: |
          # 创建 Android 标准的 assets 静态资源目录
          mkdir -p app/src/main/assets/
          
          # 自动判断并处理 MDX 文件，直接生成到内置目录
          if file ./xsjrihanshuangjie.mdx | grep -q "text"; then
            mdict --db app/src/main/assets/xsjrihanshuangjie.mdx --pack xsjrihanshuangjie.mdx
          else
            cp xsjrihanshuangjie.mdx app/src/main/assets/
          fi
          
          # 打包资源 MDD（如果有 resources 文件夹）直接到内置目录
          if [ -d "resources" ]; then
            mdict --db app/src/main/assets/xsjrihanshuangjie.mdd --pack resources/
          fi
          
          # 自动匹配并复制 CSS 到内置目录
          cp *.css app/src/main/assets/xsjrihanshuangjie.css 2>/dev/null || cp *.css app/src/main/assets/ 2>/dev/null || true
          
          echo "【检查】词库文件已成功塞入内置 assets 目录："
          ls -l app/src/main/assets/

      - name: 6. 设置 Java 环境 (编译 Android 所需)
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 现代 Android 项目通用的 JDK 17
          distribution: 'temurin'
          cache: 'gradle'

      - name: 7. 赋予 Gradle 脚本执行权限
        run: chmod +x gradlew

      - name: 8. 编译 Android APK (Debug 测试版)
        # 提示：使用 assembleDebug 编译可以避开配置签名证书（Signing Key），确保云端百分百打包成功
        run: ./gradlew assembleDebug

      - name: 9. 导出最终集成了完整词库的 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: Full-Version-Suplay-Plus-APK
          path: app/build/outputs/apk/debug/*.apk
