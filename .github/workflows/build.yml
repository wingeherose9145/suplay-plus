name: Build Full Dictionary (From Release)

on:
  workflow_dispatch: # 允许网页端手动一键运行

jobs:
  build-mdict:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 从最新的 Release 自动下载大文件
        run: |
          echo "开始从本仓库最新的 Release 中下载大文件..."
          # 去掉固定的 v1.0.0，改为直接下载最新发布的 Release 里的 mdx 文件
          gh release download --pattern "xsjrihanshuangjie.mdx" --repo ${{ github.repository }}
          echo "下载成功！"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. 安装 Mdict 打包工具
        run: |
          pip install mdict-utils

      - name: 5. 编译与打包
        run: |
          mkdir -p output
          
          # 自动判断并处理文件
          if file ./xsjrihanshuangjie.mdx | grep -q "text"; then
            mdict --db output/xsjrihanshuangjie.mdx --pack xsjrihanshuangjie.mdx
          else
            cp xsjrihanshuangjie.mdx output/
          fi
          
          # 打包资源（如果有 resources 文件夹）
          if [ -d "resources" ]; then
            mdict --db output/xsjrihanshuangjie.mdd --pack resources/
          fi
          
          # 自动匹配并复制 CSS
          cp *.css output/xsjrihanshuangjie.css 2>/dev/null || cp *.css output/ 2>/dev/null || true

      - name: 6. 导出最终成品
        uses: actions/upload-artifact@v4
        with:
          name: Full-Version-Dictionary
          path: output/
