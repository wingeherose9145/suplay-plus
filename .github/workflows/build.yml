name: Build Full Dictionary (Direct Upload)

on:
  workflow_dispatch:
    inputs:
      dictionary_text:
        description: '请点击下方“Choose File”上传你的大体积 mdx 文本/文件'
        required: true
        type: file

jobs:
  build-mdict:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 获取你上传的大文件
        run: |
          # 这一步会直接把你在网页上提交的那个 43.8M 文件接到服务器中
          mv "${{ inputs.dictionary_text }}" ./xsjrihanshuangjie.mdx

      - name: 3. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. 安装 Mdict 打包工具
        run: |
          pip install mdict-utils

      - name: 5. 编译与打包
        run: |
          mkdir -p output
          
          # 判断文件类型并处理
          # 如果是纯文本源码则编译，如果是已经编译好的二进制则直接复制
          if file ./xsjrihanshuangjie.mdx | grep -q "text"; then
            mdict --db output/xsjrihanshuangjie.mdx --pack xsjrihanshuangjie.mdx
          else
            cp xsjrihanshuangjie.mdx output/
          fi
          
          # 打包资源（如果没有 resources 文件夹会自动跳过）
          if [ -d "resources" ]; then
            mdict --db output/xsjrihanshuangjie.mdd --pack resources/
          fi
          
          # 复制配置文件
          cp xinrihanshuangjie.css output/xsjrihanshuangjie.css || cp *.css output/ 2>/dev/null || true

      - name: 6. 导出最终成品
        uses: actions/upload-artifact@v4
        with:
          name: Full-Version-Dictionary
          path: output/
